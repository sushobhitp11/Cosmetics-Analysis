spring.application.name=cosmetics-safety-analysis-system

server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cosmetics_safety_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root@123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

management.endpoints.web.exposure.include=health,info

application.security.jwt.secret-key=cosmeticsSafetyAnalysisSystemJwtSecretKey2026SecureValue
application.security.jwt.expiration=86400000

application.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200
